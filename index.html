<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" type="image/png" href="/icon-frame-0.png" />
    <script>
      let frame = 0;
      const totalFrames = 24;
      setInterval(() => {
        frame = (frame + 1) % totalFrames;
        const link = document.getElementById('favicon');
        if (link) link.href = `/icon-frame-${frame}.png`;
      }, 100);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio_Biswojit Rout</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
